<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Teacher Dashboard - Sagittarum</title>
  <style>
:root{--primary-gradient:linear-gradient(135deg,#667eea 0%,#764ba2 100%);--color-primary:#667eea;--color-text:#1f2937;--color-text-light:#6b7280;--color-white:#fff;--color-gray-100:#f3f4f6;--color-gray-200:#e5e7eb;--radius-lg:.75rem;--shadow-lg:0 10px 15px -3px rgba(0,0,0,.1);--shadow-xl:0 20px 25px -5px rgba(0,0,0,.1)}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:linear-gradient(135deg,#f5f7fa 0%,#c3cfe2 100%);color:var(--color-text);min-height:100vh}
a{color:var(--color-primary)}
button{font-family:inherit;cursor:pointer;border:none}
.card{background:var(--color-white);border-radius:1rem;padding:1.5rem;box-shadow:var(--shadow-lg);transition:transform .2s,box-shadow .2s}
.card:hover{transform:translateY(-4px);box-shadow:var(--shadow-xl)}
.btn{font-weight:600;border-radius:var(--radius-lg);padding:.75rem;cursor:pointer;background:var(--primary-gradient);color:var(--color-white)}
.btn-outline{background:transparent;color:var(--color-primary);border:2px solid var(--color-primary)}
.btn-sm{padding:.375rem .75rem;font-size:.875rem}
.navbar{background:var(--color-white);box-shadow:0 4px 6px rgba(0,0,0,.1);padding:1rem 1.5rem;display:flex;justify-content:space-between;align-items:center}
.navbar__title{background:var(--primary-gradient);-webkit-background-clip:text;-webkit-text-fill-color:transparent;font-size:1.75rem;font-weight:700;text-decoration:none}
.page-content{padding:1.5rem;max-width:1200px;margin:0 auto}
.page-content__header{margin-bottom:2rem;text-align:center}
.page-content__title{background:var(--primary-gradient);-webkit-background-clip:text;-webkit-text-fill-color:transparent;font-size:2rem}
.dashboard-grid,.classroom-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:1.5rem}
.dashboard-card__title,.classroom-detail__student-name,.classroom-detail__assignment-name{font-size:1.25rem;font-weight:600}
.dashboard-card__desc{color:var(--color-text-light);font-size:.875rem}
.classroom-detail__section{margin-bottom:1.5rem}
.classroom-detail__student,.classroom-detail__assignment{padding:.75rem;background:var(--color-gray-100);border-radius:var(--radius-lg);margin-bottom:.5rem}
.classroom-detail__student-email{font-size:.875rem;color:var(--color-text-light)}
.back-btn{margin-bottom:1rem;color:var(--color-primary);font-weight:500}
.review-submission{font-family:monospace;font-size:.875rem;white-space:pre-wrap;background:var(--color-gray-100);padding:1rem;border-radius:var(--radius-lg)}
input,textarea,select{font-family:inherit;padding:.75rem;border:2px solid var(--color-gray-200);border-radius:var(--radius-lg);width:100%}
.form-label{display:block;font-weight:600;margin-bottom:.25rem;font-size:.875rem}
.form-group{margin-bottom:1.25rem}
.assign-create-card{max-width:640px}
.assign-create-card .card{margin-bottom:1rem}
.assign-type-options{display:flex;flex-wrap:wrap;gap:.75rem}
.assign-type-option{flex:1;min-width:120px;padding:.75rem;border:2px solid var(--color-gray-200);border-radius:var(--radius-lg);cursor:pointer;text-align:center;font-weight:500;transition:border-color .2s,background .2s}
.assign-type-option:hover,.assign-type-option.selected{border-color:var(--color-primary);background:rgba(102,126,234,.08)}
.assign-type-option input{display:none}
.text-assign-note{font-size:.875rem;color:var(--color-text-light);margin-bottom:1rem;padding:.5rem 0}
.create-page{display:grid;grid-template-columns:1fr 380px;gap:1.5rem;align-items:start;max-width:1200px}
.create-left{min-width:0}
.create-preview{position:sticky;top:1rem}
.create-preview .card{background:var(--color-gray-100);border:2px dashed var(--color-gray-200)}
.preview-title{font-size:1.25rem;margin-bottom:.5rem;color:var(--color-text)}
.preview-block{margin-bottom:1.25rem;padding-bottom:1.25rem;border-bottom:1px solid var(--color-gray-200)}
.preview-block:last-child{border-bottom:0;margin-bottom:0;padding-bottom:0}
.preview-section{font-weight:700;color:var(--color-primary);font-size:1rem}
.preview-desc{color:var(--color-text-light);font-size:.875rem;white-space:pre-wrap}
.preview-q{font-weight:600;margin-bottom:.5rem;font-size:.875rem}
.preview-q-pts{font-size:.75rem;color:var(--color-text-light);font-weight:400}
.preview-input{display:block;width:100%;padding:.5rem;border:1px solid var(--color-gray-200);border-radius:var(--radius-lg);font-size:.875rem;background:var(--color-white);margin-top:.25rem}
.preview-mc-opt{display:block;margin:.35rem 0;font-size:.875rem;color:var(--color-text-light)}
.block-editor-card{border:2px solid var(--color-gray-200);border-radius:var(--radius-lg);padding:1rem;margin-bottom:.75rem;background:var(--color-white)}
.block-editor-card:hover{border-color:var(--color-primary)}
.block-editor-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:.5rem;gap:.5rem}
.block-editor-actions{display:flex;gap:.25rem}
.block-editor-actions button{padding:.25rem .5rem;font-size:.75rem;border-radius:var(--radius-lg);background:var(--color-gray-200);color:var(--color-text);cursor:pointer}
.block-editor-actions button:hover{background:var(--color-primary);color:var(--color-white)}
.block-type-badge{font-size:.7rem;text-transform:uppercase;color:var(--color-text-light);font-weight:600}
.add-block-btns{display:flex;flex-wrap:wrap;gap:.5rem;margin-top:.75rem}
.add-block-btns .btn{padding:.5rem .75rem;font-size:.875rem}
.add-block-btns .btn-outline{background:var(--color-white)}
.create-mode-essay{display:none}
.create-mode-quiz{display:none}
.create-mode-essay.active,.create-mode-quiz.active{display:block}
.ai-chat-card{height:320px;display:flex;flex-direction:column;border:2px solid var(--color-gray-200)}
.ai-chat-title{font-size:.875rem;font-weight:600;color:var(--color-primary);margin-bottom:.5rem;padding-bottom:.5rem;border-bottom:1px solid var(--color-gray-200)}
.ai-chat-messages{flex:1;overflow-y:auto;padding:.5rem 0;min-height:120px}
.ai-msg{font-size:.8rem;margin-bottom:.75rem;padding:.5rem .75rem;border-radius:var(--radius-lg);max-width:95%}
.ai-msg.user{background:var(--primary-gradient);color:var(--color-white);margin-left:auto}
.ai-msg.assistant{background:var(--color-gray-100);color:var(--color-text)}
.ai-chat-input-wrap{display:flex;gap:.5rem;margin-top:.5rem;padding-top:.5rem;border-top:1px solid var(--color-gray-200)}
.ai-chat-input-wrap input{flex:1;padding:.5rem .75rem;font-size:.875rem}
.ai-chat-input-wrap .btn{padding:.5rem .75rem;font-size:.875rem}
.preview-essay-prompt{font-size:.875rem;color:var(--color-text);white-space:pre-wrap;margin-bottom:1rem}
.preview-essay-box{min-height:120px;border:1px solid var(--color-gray-200);border-radius:var(--radius-lg);background:var(--color-white);padding:.75rem;font-size:.875rem;color:var(--color-text-light)}
@media (max-width:900px){.create-page{grid-template-columns:1fr}.create-preview{position:static}}
  </style>
</head>
<body>
  <nav class="navbar">
    <a href="#" class="navbar__title" id="navBrand">Sagittarum</a>
    <div><span id="navUser"></span> <button type="button" class="btn btn-outline btn-sm" id="logoutBtn">Logout</button></div>
  </nav>
  <main id="appContent" class="page-content"></main>
  <script>
 (function(){
var SK='sagittarum_session',D=90*24*60*60*1000; // 90 days
function getSessionFromCookie(){var name=SK+'=',c=document.cookie.split(';');for(var i=0;i<c.length;i++){var x=c[i].trim();if(x.indexOf(name)===0){try{var raw=decodeURIComponent(x.substring(name.length));var d=JSON.parse(raw);if(!d||!d.user||!d.expiresAt)return null;if(Date.now()>d.expiresAt){clearSessionCookie();return null;}return d.user;}catch(e){clearSessionCookie();return null;}}}return null;}
function clearSessionCookie(){document.cookie=SK+'=; expires=Thu, 01 Jan 1970 00:00:00 GMT; path=/';}
window.Sagittarum=window.Sagittarum||{};
window.Sagittarum.session={getCurrentUser:getSessionFromCookie,clearSession:clearSessionCookie};
var mockTeacherClassrooms=[{id:'class_1',name:'Introduction to Computer Science',studentCount:25,assignmentCount:3,students:[{id:'s1',name:'Alice Johnson',email:'alice@example.com'},{id:'s2',name:'Bob Smith',email:'bob@example.com'}],assignments:[{id:'assign_1',title:'Binary Search Implementation',submissions:20,graded:18},{id:'assign_2',title:'Sorting Algorithms Analysis',submissions:15,graded:12}]}];
var mockSubmissionResults={assign_1:{submission:'function binarySearch(arr, target) {\n  let left = 0;\n  let right = arr.length - 1;\n  while (left <= right) {\n    const mid = Math.floor((left + right) / 2);\n    if (arr[mid] === target) return mid;\n    if (arr[mid] < target) left = mid + 1;\n    else right = mid - 1;\n  }\n  return -1;\n}',score:85,maxScore:100,aiTeacherExplanation:'Good implementation of binary search. Minor deduction for not including input validation.',aiStudentExplanation:'Your binary search implementation is correct! Consider adding input validation.'}};
window.Sagittarum.mockData={getTeacherClassrooms:function(){return mockTeacherClassrooms},getSubmissionResult:function(i){return mockSubmissionResults[i]||null}};
var session=window.Sagittarum.session,mock=window.Sagittarum.mockData,user=session.getCurrentUser();
if(!user||user.role!=='teacher'){location.href='../';return}
document.getElementById('navUser').textContent=user.name+' (teacher)';
document.getElementById('logoutBtn').onclick=function(){session.clearSession();location.href='../'};
document.getElementById('navBrand').onclick=function(e){e.preventDefault();var u=session.getCurrentUser();if(!u){location.href='../signin/';return}location.href=u.role==='teacher'?'../teacher/':'../student/'};
function esc(s){if(!s)return'';var d=document.createElement('div');d.textContent=s;return d.innerHTML}
function render(){var hash=(location.hash||'#').slice(1),parts=hash?hash.split('/'):[],c=document.getElementById('appContent');
if(parts[0]==='assignment'&&parts[2]==='review'){renderReview(c,parts[1])}else if(parts[0]==='assignment'&&parts[1]==='create'){renderCreate(c)}else if(parts[0]==='classroom'){renderClassroom(c,parts[1])}else if(parts[0]==='classrooms'){renderList(c)}else{renderDash(c)}}
function renderDash(c){var cards=[{title:'Create Classroom',hash:'#classroom/create'},{title:'View Classrooms',hash:'#classrooms'},{title:'Create Assignment',hash:'#assignment/create'},{title:'Analytics',hash:'#analytics'}];c.innerHTML='<div class="page-content__header"><h1 class="page-content__title">Sagittarum</h1><p>Teacher Dashboard</p></div><div class="dashboard-grid">'+cards.map(function(x){return'<div class="card dashboard-card" data-hash="'+x.hash+'"><div class="dashboard-card__title">'+esc(x.title)+'</div><div class="dashboard-card__desc">Click to open</div></div>'}).join('')+'</div>';c.querySelectorAll('.dashboard-card').forEach(function(el){el.onclick=function(){var h=el.dataset.hash;if(h==='#analytics'||h==='#classroom/create'){c.innerHTML='<div class="card"><h2>Coming soon</h2></div>'}else{location.hash=h.slice(1)}}})}
function renderList(c){var cls=mock.getTeacherClassrooms();c.innerHTML='<div style="display:flex;justify-content:space-between;margin-bottom:1.5rem"><div><h1>My Classrooms</h1></div></div><div class="classroom-grid">'+cls.map(function(x){return'<div class="card classroom-card" data-id="'+x.id+'"><div class="dashboard-card__title">'+esc(x.name)+'</div><div class="dashboard-card__desc">'+x.studentCount+' students, '+x.assignmentCount+' assignments</div></div>'}).join('')+'</div>';c.querySelectorAll('.classroom-card').forEach(function(el){el.onclick=function(){location.hash='#classroom/'+el.dataset.id}})}
function renderClassroom(c,id){var cls=mock.getTeacherClassrooms().filter(function(x){return x.id===id})[0];if(!cls){c.innerHTML='<div class="card"><p>Not found.</p><a href="#classrooms">Back</a></div>';return}var sh=cls.students.map(function(s){return'<div class="classroom-detail__student"><div class="classroom-detail__student-name">'+esc(s.name)+'</div><div class="classroom-detail__student-email">'+esc(s.email)+'</div></div>'}).join(''),ah=cls.assignments.map(function(a){return'<div class="classroom-detail__assignment" style="display:flex;justify-content:space-between;align-items:center"><div><div class="classroom-detail__assignment-name">'+esc(a.title)+'</div><span style="font-size:.875rem">'+a.submissions+' submissions, '+a.graded+' graded</span></div><a href="#assignment/'+a.id+'/review" class="btn btn-outline btn-sm">Review</a></div>'}).join('');c.innerHTML='<button class="back-btn" id="b1">&larr; Back</button><div class="card" style="margin-bottom:1.5rem;text-align:center"><h1>'+esc(cls.name)+'</h1></div><div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(300px,1fr));gap:1.5rem"><div class="card classroom-detail__section"><h2>Students</h2>'+sh+'</div><div class="card classroom-detail__section"><h2>Assignments</h2>'+ah+'</div></div>';document.getElementById('b1').onclick=function(){location.hash='#classrooms'}}
var createState={title:'',assignType:'quiz',totalPoints:'',dueDate:'',blocks:[],essayPrompt:'',aiMessages:[]};
var createId=0;
function nextCreateId(){createId+=1;return createId;}
function renderCreate(c){
c.innerHTML='<button class="back-btn" id="b1">&larr; Back</button><div class="create-page"><div class="create-left"><div class="card"><h1>Create text assignment</h1><p class="text-assign-note">Choose Essay (single prompt) or Quiz (multiple questions + AI help).</p><form id="af"><div class="form-group"><label class="form-label" for="at">Title</label><input type="text" id="at" placeholder="e.g. Chapter 5 Quiz" /></div><div class="form-group"><span class="form-label">Type</span><div class="assign-type-options" id="typeOptions"><label class="assign-type-option selected" data-type="quiz"><input type="radio" name="assignType" value="quiz" checked /> Quiz</label><label class="assign-type-option" data-type="essay"><input type="radio" name="assignType" value="essay" /> Essay</label></div></div><div class="create-mode-quiz active" id="createModeQuiz"><div id="createBlocks"></div><div class="add-block-btns"><button type="button" class="btn btn-outline btn-sm" id="addQuestion">+ Question</button><button type="button" class="btn btn-outline btn-sm" id="addSection">+ Section</button><button type="button" class="btn btn-outline btn-sm" id="addDesc">+ Description</button></div></div><div class="create-mode-essay" id="createModeEssay"><div class="form-group"><label class="form-label" for="essayPrompt">Essay prompt / instructions</label><textarea id="essayPrompt" rows="6" placeholder="Enter the single essay prompt. Students will respond in one text area."></textarea></div></div><div class="form-group" style="margin-top:1.25rem"><label class="form-label" for="ap">Total points</label><input type="number" id="ap" min="1" placeholder="100" /></div><div class="form-group"><label class="form-label" for="ad">Due date (optional)</label><input type="date" id="ad" /></div><button type="submit" class="btn">Create assignment</button></form></div></div><div class="create-preview"><div class="card"><h2 class="preview-title" style="font-size:1rem;color:var(--color-text-light);margin-bottom:.75rem">Preview</h2><div id="createPreview"></div></div><div class="card ai-chat-card" id="aiChatCard" style="margin-top:1rem"><div class="ai-chat-title">AI assistant</div><div class="ai-chat-messages" id="aiChatMessages"></div><div class="ai-chat-input-wrap"><input type="text" id="aiChatInput" placeholder="Ask AI to help create questions..." /><button type="button" class="btn btn-sm" id="aiChatSend">Send</button></div></div></div></div>';
document.getElementById('b1').onclick=function(){location.hash='';};
if(createState.blocks.length===0){createState.blocks.push({id:nextCreateId(),type:'question',questionType:'short_answer',content:'',points:''});}
if(createState.aiMessages.length===0){createState.aiMessages.push({role:'assistant',text:'I can help you create quiz questions. Tell me the topic or say something like "Add 3 multiple choice questions about photosynthesis" or "Write a short-answer question about the water cycle."'});}
var opts=document.querySelectorAll('.assign-type-option');
function switchCreateMode(){getCreateMeta();var isQuiz=createState.assignType==='quiz';document.getElementById('createModeQuiz').classList.toggle('active',isQuiz);document.getElementById('createModeEssay').classList.toggle('active',!isQuiz);var ac=document.getElementById('aiChatCard');if(ac)ac.style.display=isQuiz?'flex':'none';var ep=document.getElementById('essayPrompt');if(ep)ep.value=createState.essayPrompt;updateCreatePreview();}
opts.forEach(function(o){o.onclick=function(){opts.forEach(function(x){x.classList.remove('selected');});o.classList.add('selected');o.querySelector('input').checked=true;switchCreateMode();};(o.querySelector('input').checked)&&o.classList.add('selected');});
function getCreateMeta(){createState.title=document.getElementById('at').value;createState.assignType=(document.querySelector('input[name="assignType"]:checked')||{}).value||'quiz';createState.totalPoints=document.getElementById('ap').value;createState.dueDate=document.getElementById('ad').value;var ep=document.getElementById('essayPrompt');if(ep)createState.essayPrompt=ep.value;return createState;}
function updateCreatePreview(){getCreateMeta();var el=document.getElementById('createPreview');if(!el)return;var s=createState,t=s.title||'Untitled';var html='<div class="preview-title">'+esc(t)+'</div>';if(s.dueDate)html+='<div class="preview-desc" style="margin-bottom:.75rem">Due: '+esc(s.dueDate)+'</div>';if(s.assignType==='essay'){html+='<div class="preview-block"><div class="preview-essay-prompt">'+esc(s.essayPrompt||'Essay prompt will appear here.')+'</div><div class="preview-essay-box">Your essay response...</div></div>';}else{s.blocks.forEach(function(b){if(b.type==='section'){html+='<div class="preview-block"><div class="preview-section">'+esc(b.content||'Section')+'</div></div>';}else if(b.type==='description'){html+='<div class="preview-block"><div class="preview-desc">'+esc(b.content||'')+'</div></div>';}else if(b.type==='question'){var qtype=b.questionType||'short_answer';html+='<div class="preview-block"><div class="preview-q">'+esc(b.content||'Question')+(b.points?' <span class="preview-q-pts">('+b.points+' pts)</span>':'')+'</div>';if(qtype==='short_answer')html+='<input type="text" class="preview-input" placeholder="Your answer" readonly />';else if(qtype==='paragraph')html+='<textarea class="preview-input" rows="3" placeholder="Your answer" readonly></textarea>';else if(qtype==='multiple_choice'&&b.options){b.options.forEach(function(opt){html+='<label class="preview-mc-opt"><input type="radio" name="preview_'+b.id+'" /> '+esc(opt)+'</label>';});}html+='</div>';}});}el.innerHTML=html;}
function renderAiChat(){var el=document.getElementById('aiChatMessages');if(!el)return;el.innerHTML=createState.aiMessages.map(function(m){return'<div class="ai-msg '+m.role+'">'+esc(m.text)+'</div>';}).join('');el.scrollTop=el.scrollHeight;}
function renderCreateBlocks(){var cont=document.getElementById('createBlocks');if(!cont)return;getCreateMeta();var html='';createState.blocks.forEach(function(b,i){var isFirst=i===0,isLast=i===createState.blocks.length-1;html+='<div class="block-editor-card" data-id="'+b.id+'"><div class="block-editor-header"><span class="block-type-badge">'+(b.type==='section'?'Section':b.type==='description'?'Description':'Question')+'</span><div class="block-editor-actions"><button type="button" class="moveUp" data-id="'+b.id+'">↑</button><button type="button" class="moveDown" data-id="'+b.id+'">↓</button><button type="button" class="blockDel" data-id="'+b.id+'">✕</button></div></div>';
if(b.type==='section'){html+='<input type="text" class="block-content" data-id="'+b.id+'" placeholder="Section title" value="'+esc(b.content||'')+'" />';}
else if(b.type==='description'){html+='<textarea class="block-content" data-id="'+b.id+'" rows="2" placeholder="Description text">'+esc(b.content||'')+'</textarea>';}
else if(b.type==='question'){html+='<input type="text" class="block-content" data-id="'+b.id+'" placeholder="Question text" value="'+esc(b.content||'')+'" />';html+='<div style="margin-top:.5rem"><select class="block-qtype" data-id="'+b.id+'"><option value="short_answer"'+(b.questionType==='short_answer'?' selected':'')+'>Short answer</option><option value="paragraph"'+(b.questionType==='paragraph'?' selected':'')+'>Paragraph</option><option value="multiple_choice"'+(b.questionType==='multiple_choice'?' selected':'')+'>Multiple choice</option></select> <input type="number" class="block-points" data-id="'+b.id+'" placeholder="Points" style="width:80px" min="0" value="'+esc(b.points||'')+'" /></div>';
if(b.questionType==='multiple_choice'){var opts=b.options&&b.options.length?b.options:['',''];html+='<div class="block-mc-options" data-id="'+b.id+'" style="margin-top:.5rem">';opts.forEach(function(opt,j){html+='<input type="text" class="mc-opt" data-id="'+b.id+'" data-i="'+j+'" value="'+esc(opt||'')+'" placeholder="Option '+(j+1)+'" style="margin:.25rem 0;width:100%" />';});html+='<button type="button" class="add-mc-opt btn-outline btn-sm" data-id="'+b.id+'" style="margin-top:.25rem">+ Option</button></div>';}
}html+='</div>';});cont.innerHTML=html;
cont.querySelectorAll('.block-content').forEach(function(inp){inp.oninput=function(){var id=Number(inp.dataset.id),bl=createState.blocks.filter(function(x){return x.id===id})[0];if(bl)bl.content=inp.value;updateCreatePreview();};});
cont.querySelectorAll('.block-qtype').forEach(function(sel){sel.onchange=function(){var id=Number(sel.dataset.id),bl=createState.blocks.filter(function(x){return x.id===id})[0];if(bl){bl.questionType=sel.value;if(sel.value==='multiple_choice'&&!bl.options)bl.options=['',''];renderCreateBlocks();updateCreatePreview();}};});
cont.querySelectorAll('.block-points').forEach(function(inp){inp.oninput=function(){var id=Number(inp.dataset.id),bl=createState.blocks.filter(function(x){return x.id===id})[0];if(bl)bl.points=inp.value;updateCreatePreview();};});
cont.querySelectorAll('.moveUp').forEach(function(btn){btn.onclick=function(){var id=Number(btn.dataset.id),i=createState.blocks.findIndex(function(x){return x.id===id});if(i>0){var t=createState.blocks[i];createState.blocks[i]=createState.blocks[i-1];createState.blocks[i-1]=t;renderCreateBlocks();updateCreatePreview();}};});
cont.querySelectorAll('.moveDown').forEach(function(btn){btn.onclick=function(){var id=Number(btn.dataset.id),i=createState.blocks.findIndex(function(x){return x.id===id});if(i>=0&&i<createState.blocks.length-1){var t=createState.blocks[i];createState.blocks[i]=createState.blocks[i+1];createState.blocks[i+1]=t;renderCreateBlocks();updateCreatePreview();}};});
cont.querySelectorAll('.blockDel').forEach(function(btn){btn.onclick=function(){var id=Number(btn.dataset.id);createState.blocks=createState.blocks.filter(function(x){return x.id!==id});renderCreateBlocks();updateCreatePreview();};});
cont.querySelectorAll('.mc-opt').forEach(function(inp){inp.oninput=function(){var id=Number(inp.dataset.id),i=Number(inp.dataset.i),bl=createState.blocks.filter(function(x){return x.id===id})[0];if(bl){if(!bl.options)bl.options=[];bl.options[i]=inp.value;updateCreatePreview();}};});
cont.querySelectorAll('.add-mc-opt').forEach(function(btn){btn.onclick=function(){var id=Number(btn.dataset.id),bl=createState.blocks.filter(function(x){return x.id===id})[0];if(bl){if(!bl.options)bl.options=[];bl.options.push('');renderCreateBlocks();updateCreatePreview();}};});
}
document.getElementById('addQuestion').onclick=function(){createState.blocks.push({id:nextCreateId(),type:'question',questionType:'short_answer',content:'',points:''});renderCreateBlocks();updateCreatePreview();};
document.getElementById('addSection').onclick=function(){createState.blocks.push({id:nextCreateId(),type:'section',content:''});renderCreateBlocks();updateCreatePreview();};
document.getElementById('addDesc').onclick=function(){createState.blocks.push({id:nextCreateId(),type:'description',content:''});renderCreateBlocks();updateCreatePreview();};
document.getElementById('at').oninput=document.getElementById('ap').oninput=document.getElementById('ad').oninput=function(){updateCreatePreview();};
var essayEl=document.getElementById('essayPrompt');if(essayEl){essayEl.value=createState.essayPrompt;essayEl.oninput=function(){createState.essayPrompt=essayEl.value;updateCreatePreview();};}
function mockAiReply(userText){var u=userText.toLowerCase();if(/\badd\b.*\bquestion\b/.test(u)||/\bquestion\b.*\babout\b/.test(u)){var match=userText.match(/(?:about|on)\s+([^.?!]+)/i);var topic=match?match[1].trim():'this topic';createState.blocks.push({id:nextCreateId(),type:'question',questionType:'short_answer',content:'Question about '+topic+' (edit as needed)',points:''});renderCreateBlocks();updateCreatePreview();return'Added a short-answer question. You can edit it in the list above. Want more questions or a different type (multiple choice, paragraph)?';}if(/\bmultiple\s*choice\b/.test(u)){createState.blocks.push({id:nextCreateId(),type:'question',questionType:'multiple_choice',content:'New multiple choice question',points:'',options:['','','']});renderCreateBlocks();updateCreatePreview();return'Added a multiple choice question. Edit the question and options in the list above.';}return'I can add questions to your quiz if you say "Add a question about [topic]" or "Add a multiple choice question." You can also describe the topic and I\'ll suggest question ideas.';}
document.getElementById('aiChatSend').onclick=function(){var inp=document.getElementById('aiChatInput');var txt=(inp&&inp.value||'').trim();if(!txt)return;createState.aiMessages.push({role:'user',text:txt});inp.value='';renderAiChat();setTimeout(function(){var reply=mockAiReply(txt);createState.aiMessages.push({role:'assistant',text:reply});renderAiChat();},400);};
document.getElementById('aiChatInput').onkeydown=function(e){if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();document.getElementById('aiChatSend').click();}};
document.getElementById('af').onsubmit=function(e){e.preventDefault();getCreateMeta();if(!createState.title.trim()){alert('Enter a title.');return;}if(createState.assignType==='essay'){if(!createState.essayPrompt.trim()){alert('Enter the essay prompt.');return;}}else{if(createState.blocks.length===0){alert('Add at least one question, section, or description.');return;}}alert('Assignment created! (Webhooks can be added later.)');location.hash='';};
renderCreateBlocks();updateCreatePreview();switchCreateMode();renderAiChat();
}
function renderReview(c,assignId){var r=mock.getSubmissionResult(assignId);if(!r){c.innerHTML='<div class="card"><p>No submissions.</p><a href="#classrooms">Back</a></div>';return}var pct=Math.round((r.score/r.maxScore)*100);c.innerHTML='<button class="back-btn" id="b1">&larr; Back</button><div class="card" style="margin-bottom:1.5rem;text-align:center"><h1>Assignment Review</h1><p>Student: Alice Johnson</p></div><div class="card" style="margin-bottom:1.5rem"><h2>Submission</h2><pre class="review-submission">'+esc(r.submission)+'</pre></div><div class="card" style="margin-bottom:1.5rem;text-align:center"><div style="font-size:3rem;font-weight:700;background:var(--primary-gradient);-webkit-background-clip:text;-webkit-text-fill-color:transparent">'+r.score+' / '+r.maxScore+'</div><div>'+pct+'%</div></div><div class="card" style="margin-bottom:1.5rem"><h2>AI Teacher Explanation</h2><p>'+esc(r.aiTeacherExplanation)+'</p></div><div class="card"><h2>AI Student Explanation</h2><p>'+esc(r.aiStudentExplanation)+'</p></div>';document.getElementById('b1').onclick=function(){location.hash='#classrooms'}}
window.onhashchange=render;render();
})();
  </script>
</body>
